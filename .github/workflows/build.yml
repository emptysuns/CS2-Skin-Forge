name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: CS2-Skin-Mod
            ext: exe
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: CS2-Skin-Mod
            ext: AppImage
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact_name: CS2-Skin-Mod
            ext: dmg

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libglib2.0-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./Panel

      - name: Build Tauri app
        run: npx tauri build --target ${{ matrix.target }}
        working-directory: ./Panel

      - name: Find and upload artifacts (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          find Panel/src-tauri/target/${{ matrix.target }}/release/bundle -name "*.AppImage" -not -name "*.sig" | head -1
          echo "ARTIFACT_PATH=$(find Panel/src-tauri/target/${{ matrix.target }}/release/bundle -name '*.AppImage' -not -name '*.sig' | head -1)" >> $GITHUB_ENV

      - name: Find and upload artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          $exe = Get-ChildItem -Path "Panel/src-tauri/target/${{ matrix.target }}/release/bundle" -Recurse -Filter "*.exe" | Where-Object { $_.Name -notmatch "\.sig$" } | Select-Object -First 1
          echo "ARTIFACT_PATH=$($exe.FullName)" >> $env:GITHUB_ENV

      - name: Find and upload artifacts (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          echo "ARTIFACT_PATH=$(find Panel/src-tauri/target/${{ matrix.target }}/release/bundle -name '*.dmg' -not -name '*.sig' | head -1)" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: ${{ env.ARTIFACT_PATH }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: CS2-Skin-Mod ${{ github.ref_name }}
          body: |
            # CS2-Skin-Mod ${{ github.ref_name }}

            A local-only skin customization plugin for Counter-Strike 2.

            See [README](https://github.com/${{ github.repository }}/blob/main/README.md) for instructions.

            ---

            # 中文说明

            一个用于 CS2 的本地皮肤自定义插件。详细说明请查看 [中文文档](https://github.com/${{ github.repository }}/blob/main/README_CN.md)。
          draft: false
          prerelease: false
          files: |
            artifacts/release-ubuntu-latest/*
            artifacts/release-windows-latest/*
            artifacts/release-macos-latest/*
