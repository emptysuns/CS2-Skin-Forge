name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libglib2.0-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./Panel

      - name: Setup .NET SDK
        if: matrix.platform == 'windows-latest'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build PlayerSkinMod plugin (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          dotnet build addons/counterstrikesharp/plugins/PlayerSkinMod/PlayerSkinMod.csproj -c Release
          mkdir -p addons/counterstrikesharp/plugins/PlayerSkinMod/bin
          cp addons/counterstrikesharp/plugins/PlayerSkinMod/bin/Release/net8.0/PlayerSkinMod.dll addons/counterstrikesharp/plugins/PlayerSkinMod/
          ls -la addons/counterstrikesharp/plugins/PlayerSkinMod/

      - name: Build Tauri app
        run: npx tauri build --target ${{ matrix.target }}
        working-directory: ./Panel

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            Panel/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.exe
            Panel/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.msi
          if-no-files-found: error

      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            Panel/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/**/*.AppImage
            Panel/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/**/*.deb
          if-no-files-found: error

      - name: Upload macOS artifacts
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: |
            Panel/src-tauri/target/aarch64-apple-darwin/release/bundle/**/*.dmg
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build PlayerSkinMod plugin
        run: |
          dotnet build addons/counterstrikesharp/plugins/PlayerSkinMod/PlayerSkinMod.csproj -c Release
          mkdir -p addons/counterstrikesharp/plugins/PlayerSkinMod/bin
          cp addons/counterstrikesharp/plugins/PlayerSkinMod/bin/Release/net8.0/PlayerSkinMod.dll addons/counterstrikesharp/plugins/PlayerSkinMod/
          ls -la addons/counterstrikesharp/plugins/PlayerSkinMod/PlayerSkinMod.dll

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List all artifact files
        run: |
          echo "=== All artifact files ==="
          find artifacts -type f | sort
          echo ""
          echo "=== Executable/bundle files (excluding .sig) ==="
          find artifacts -type f -not -name "*.sig" | sort

      - name: Collect release files
        id: collect
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name "*.exe" -o -name "*.msi" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.dmg" \) -not -name "*.sig" -exec cp {} release-files/ \;

          # Create addons zip with the compiled CS2 plugin DLL
          cd addons
          zip -r ../release-files/addons.zip \
            counterstrikesharp/plugins/PlayerSkinMod/PlayerSkinMod.dll \
            counterstrikesharp/plugins/PlayerSkinMod/PlayerSkinMod.json \
            counterstrikesharp/plugins/PlayerSkinMod/skins_en.json
          cd ..

          echo "=== Files to release ==="
          ls -la release-files/
          echo "file_count=$(ls release-files/ | wc -l)" >> $GITHUB_OUTPUT

      - name: Rename release files with version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd release-files
          for f in *.exe *.msi *.AppImage *.deb *.dmg; do
            if [ -f "$f" ]; then
              base="${f%.*}"
              ext="${f##*.}"
              # Skip rename if version is already in the filename
              if echo "$base" | grep -q "$VERSION"; then
                echo "Skipping $f (already contains version $VERSION)"
              else
                mv "$f" "${base}-${VERSION}.${ext}"
              fi
            fi
          done

      - name: Verify release files exist
        run: |
          if [ "${{ steps.collect.outputs.file_count }}" -eq "0" ]; then
            echo "ERROR: No release files found!"
            exit 1
          fi
          echo "Found ${{ steps.collect.outputs.file_count }} release files"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: CS2-Skin-Mod ${{ github.ref_name }}
          body: |
            # CS2-Skin-Mod ${{ github.ref_name }}

            A local-only skin customization plugin for Counter-Strike 2.

            ## Installation

            1. Download and install the panel app for your platform
            2. Download `addons.zip` and extract to your CS2 `game/csgo/` directory
            3. Add `-insecure` to CS2 launch options
            4. Launch the panel, set your CS2 path in Settings, and customize!

            See [README](https://github.com/${{ github.repository }}/blob/main/README.md) for detailed instructions.

            ---

            # 中文说明

            1. 下载并安装适合您平台的面板应用
            2. 下载 `addons.zip` 并解压到 CS2 的 `game/csgo/` 目录
            3. 在 CS2 启动选项中添加 `-insecure`
            4. 启动面板，在设置中设置 CS2 路径，然后开始自定义！

            详细说明请查看 [中文文档](https://github.com/${{ github.repository }}/blob/main/README_CN.md)。
          draft: false
          prerelease: false
          overwrite_files: true
          files: release-files/*
