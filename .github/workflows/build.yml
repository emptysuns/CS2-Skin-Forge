name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libglib2.0-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./Panel

      - name: Build Tauri app
        run: npx tauri build --target ${{ matrix.target }}
        working-directory: ./Panel

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            Panel/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.exe
            Panel/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.msi
          if-no-files-found: error

      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            Panel/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/**/*.AppImage
            Panel/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/**/*.deb
          if-no-files-found: error

      - name: Upload macOS artifacts
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: |
            Panel/src-tauri/target/aarch64-apple-darwin/release/bundle/**/*.dmg
            Panel/src-tauri/target/aarch64-apple-darwin/release/bundle/**/*.app
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List all artifact files
        run: |
          echo "=== All artifact files ==="
          find artifacts -type f | sort
          echo ""
          echo "=== Executable/bundle files (excluding .sig) ==="
          find artifacts -type f -not -name "*.sig" | sort

      - name: Collect release files
        id: collect
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name "*.exe" -o -name "*.msi" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.dmg" \) -not -name "*.sig" -exec cp {} release-files/ \;
          find artifacts -type d -name "*.app" -exec cp -r {} release-files/ \; 2>/dev/null || true
          echo "=== Files to release ==="
          ls -la release-files/
          echo "file_count=$(ls release-files/ | wc -l)" >> $GITHUB_OUTPUT

      - name: Verify release files exist
        run: |
          if [ "${{ steps.collect.outputs.file_count }}" -eq "0" ]; then
            echo "ERROR: No release files found!"
            exit 1
          fi
          echo "Found ${{ steps.collect.outputs.file_count }} release files"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: CS2-Skin-Mod ${{ github.ref_name }}
          body: |
            # CS2-Skin-Mod ${{ github.ref_name }}

            A local-only skin customization plugin for Counter-Strike 2.

            See [README](https://github.com/${{ github.repository }}/blob/main/README.md) for instructions.

            ---

            # 中文说明

            一个用于 CS2 的本地皮肤自定义插件。详细说明请查看 [中文文档](https://github.com/${{ github.repository }}/blob/main/README_CN.md)。
          draft: false
          prerelease: false
          replace_artifacts: true
          files: release-files/*
